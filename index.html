<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <style>
        body { text-align: center; font-family: 'Courier New', sans-serif; background: #ffe6e6; padding-top: 100px; }
        h1 { color: #ff4d4d; }
        .btn-container { position: relative; height: 100px; margin-top: 50px; }
        button { font-size: 20px; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; position: absolute; }
        #yesBtn { background: #ff4d4d; color: white; left: 40%; }
        #noBtn { background: #b3b3b3; color: white; left: 52%; transition: 0.2s ease; }
    </style>
</head>
<body>
    <h1>Will you be my Valentine? 🌹</h1>
    <div class="btn-container">
        <button id="yesBtn" onclick="alert('Yay! ❤️ Can\'t wait!')">Yes</button>
        <button id="noBtn" onmouseover="moveButton()">No</button>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }
    </script>
</body>
</html>
