<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Buat Kamu ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .box {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 400px;
        }
        h1 { color: #ff4d6d; }
        p { color: #4a4a4a; font-size: 18px; line-height: 1.6; }
        .hati { font-size: 50px; animation: detak 1.2s infinite; }
        @keyframes detak {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="hati">❤️</div>
        <h1>Halo Cantik/Ganteng!</h1>
        <p>Web ini sengaja aku bikin khusus buat kamu. Terima kasih ya sudah jadi orang yang paling sabar dan selalu ada buat aku. <i>I love you more than words can say!</i></p>
    </div>

</body>
</html>
